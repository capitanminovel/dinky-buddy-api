name: Daily Menu Scrape

on:
  schedule:
    # 9:00 AM CST = 15:00 UTC
    - cron: '0 15 * * *'
    # 1:00 PM CST = 19:00 UTC
    - cron: '0 19 * * *'
    # 4:30 PM CST = 22:30 UTC
    - cron: '30 22 * * *'
    # 10:00 PM CST = 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:   # click "Run workflow" in GitHub any time

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml playwright anthropic python-docx
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper.py

      - name: Enrich new strains
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python enrich_strains.py

      - name: Build static HTML from scraped data
        run: python build_preview.py

      - name: Commit updated data
        run: |
          git config user.name  "Dinky Buddy Bot"
          git config user.email "actions@github.com"
          git add docs/products.json docs/index.html docs/strains_enriched.json
          git add docs/debug_api.json 2>/dev/null || true
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "🌿 Menu update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin HEAD
